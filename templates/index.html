<!DOCTYPE html>
<html>
<head>
    <title>Pachakari Express</title>
</head>
<body>

    <h1>Pachakari Express</h1>

    <form action="/submit" method="POST">

    <input
        type="text"
        name="customer_name"
        placeholder="Customer Name"
        required>

    <br><br>

    <input
        type="text"
        name="phone_number"
        placeholder="Phone Number"
        required>

    <br><br>

    <textarea
        name="grocery_items"
        placeholder="Enter Grocery Items"
        required></textarea>

    <br><br>

    <button type="submit">
        Submit Order
    </button>

</form>

</body>
</html>
